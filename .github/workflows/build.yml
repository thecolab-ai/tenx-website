name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          elif [ -f package.json ]; then
            pnpm install --no-frozen-lockfile
          else
            echo "No package.json yet — skipping install (initial repo state)"
            exit 0
          fi

      - name: Build
        run: |
          if [ -f package.json ]; then
            pnpm run build
          else
            echo "No build to run yet"
          fi

      - name: Upload artifact
        if: hashFiles('dist/**') != ''
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: dist
          retention-days: 7
